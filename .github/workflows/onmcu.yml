name: OnMCU

# Build each example crate and run it on real hardware via OnMCU. Only the
# crates whose folder changed are run; pushing to one board's example does not
# spend a job (or an OnMCU run) on the others.

on:
  push:
    paths:
      - "nucleo-*/**"
      - "lp-cc1312r7/**"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/onmcu.yml"
  pull_request:
    paths:
      - "nucleo-*/**"
      - "lp-cc1312r7/**"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/onmcu.yml"
  workflow_dispatch: # manual trigger runs every crate

permissions:
  contents: read

jobs:
  # Detect which example folders changed and emit the list as a JSON array.
  changes:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.decide.outputs.crates }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nucleo-h743zi: ['nucleo-h743zi/**']
            nucleo-f401re: ['nucleo-f401re/**']
            nucleo-f439zi: ['nucleo-f439zi/**']
            nucleo-wb55rg: ['nucleo-wb55rg/**']
            nucleo-wl55jc: ['nucleo-wl55jc/**']
            lp-cc1312r7: ['lp-cc1312r7/**']
      - id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'crates=["nucleo-h743zi","nucleo-f401re","nucleo-f439zi","nucleo-wb55rg","nucleo-wl55jc","lp-cc1312r7"]' >> "$GITHUB_OUTPUT"
          else
            echo 'crates=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          fi

  # One job per changed crate: build it, then flash + run it on OnMCU.
  run:
    needs: changes
    if: ${{ needs.changes.outputs.crates != '[]' && needs.changes.outputs.crates != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJSON(needs.changes.outputs.crates) }}
    env:
      # No `onmcu login` needed in CI: the key is read from the environment.
      ONMCU_API_KEY: ${{ secrets.ONMCU_API_KEY }}
      ONMCU_CLI_CONFIG_PATH: ${{ github.workspace }}/onmcu-ci.toml
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the stable channel and the Cortex-M targets,
      # so rustup provisions everything needed here.
      - name: Provision Rust toolchain and targets
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.crate }}

      - name: Install OnMCU CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/onmcu/onmcu-rs/releases/latest/download/onmcu-installer.sh | sh

      - name: Write OnMCU config
        run: |
          cat > "$ONMCU_CLI_CONFIG_PATH" <<'EOF'
          server = "https://ctrl1.onmcu.com"
          chunk_size = 5
          retries = 3
          timeout_seconds = 600
          EOF

      - name: Build and run ${{ matrix.crate }} on OnMCU
        working-directory: ${{ matrix.crate }}
        run: |
          board=$(sed -n 's/^runner = "onmcu run --board \(.*\) --file"/\1/p' .cargo/config.toml)
          elf=$(cargo build --release --message-format=json \
            | jq -r 'select(.reason=="compiler-artifact" and .executable!=null) | .executable' \
            | tail -n1)
          echo "Running $elf on board $board"
          onmcu run --board "$board" --file "$elf" --api-key-from-env
