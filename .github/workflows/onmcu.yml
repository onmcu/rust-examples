name: OnMCU

# Build each example crate and run it on real hardware via OnMCU. On pull
# requests only the crates whose folder changed are run, so a PR touching one
# board does not spend a job (or an OnMCU run) on the others. Pushes to `main`
# and manual `workflow_dispatch` runs always exercise every board.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "nucleo-*/**"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/onmcu.yml"
  schedule:
    - cron: "0 * * * *" # hourly run exercises every board
  workflow_dispatch: # manual trigger runs every crate

permissions:
  contents: read

jobs:
  # Detect which example folders changed and emit the list as a JSON array.
  changes:
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.decide.outputs.crates }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nucleo-h743zi: ['nucleo-h743zi/**']
            nucleo-f401re: ['nucleo-f401re/**']
            nucleo-f401re-serial: ['nucleo-f401re-serial/**']
            nucleo-f439zi: ['nucleo-f439zi/**']
            nucleo-wb55rg: ['nucleo-wb55rg/**']
            nucleo-wl55jc: ['nucleo-wl55jc/**']
      - id: decide
        run: |
          # Pushes to main and manual runs cover every board; PRs run only the
          # crates whose folder changed.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'crates=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
          else
            echo 'crates=["nucleo-h743zi","nucleo-f401re","nucleo-f401re-serial","nucleo-f439zi","nucleo-wb55rg","nucleo-wl55jc"]' >> "$GITHUB_OUTPUT"
          fi

  # One job per changed crate: build it, then flash + run it on OnMCU.
  run:
    needs: changes
    if: ${{ needs.changes.outputs.crates != '[]' && needs.changes.outputs.crates != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJSON(needs.changes.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the stable channel and the Cortex-M targets,
      # so rustup provisions everything needed here.
      - name: Provision Rust toolchain and targets
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.crate }}

      # Build the firmware and surface the board name and linked ELF so the
      # OnMCU action can flash + run it.
      - name: Build ${{ matrix.crate }}
        id: build
        working-directory: ${{ matrix.crate }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s inherit_errexit

          # The per-crate runner encodes the full OnMCU invocation:
          #   onmcu run --board <BOARD> [extra opts] --file
          # Split out the board and any extra options (e.g. --logging serial) so
          # the OnMCU action runs with the same flags as a local `cargo run`.
          runner=$(sed -n 's/^runner = "\(.*\)"$/\1/p' .cargo/config.toml)
          rest=${runner#onmcu run --board }
          board=${rest%% *}
          args=${rest#"$board"}
          args=${args% --file}
          args=${args# }

          # inherit_errexit makes a failed `cargo build` abort the step instead
          # of silently yielding an empty ELF to the run below.
          elf=$(cargo build --release --message-format=json \
            | jq -r 'select(.reason=="compiler-artifact" and .executable!=null) | .executable' \
            | tail -n1)

          echo "board=$board" >> "$GITHUB_OUTPUT"
          echo "args=$args" >> "$GITHUB_OUTPUT"
          echo "elf=$elf" >> "$GITHUB_OUTPUT"

      - name: Run ${{ matrix.crate }} on OnMCU
        uses: onmcu/onmcu-action@v1
        with:
          board: ${{ steps.build.outputs.board }}
          file: ${{ steps.build.outputs.elf }}
          args: ${{ steps.build.outputs.args }}
          api-key: ${{ secrets.ONMCU_API_KEY }}
